<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 360" role="img" aria-labelledby="title desc">
  <title id="title">RJ's product engineering map</title>
  <desc id="desc">A static diagram connecting inputs like messy data and product ambiguity to systems such as AI agents, dashboards, benchmarks, and developer tooling.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#10151f"/>
      <stop offset="1" stop-color="#182334"/>
    </linearGradient>
    <linearGradient id="line" x1="0" x2="1">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="980" height="360" rx="24" fill="#0b0f16"/>
  <path d="M0 270 C160 210 260 335 420 265 C610 180 790 245 980 150 L980 360 L0 360 Z" fill="#112033"/>
  <path d="M0 80 C150 140 300 35 470 95 C650 160 810 60 980 115" fill="none" stroke="#26364d" stroke-width="2"/>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="50" y="60" fill="#f8fafc" font-size="30" font-weight="700">AI product engineering, end to end</text>
    <text x="50" y="90" fill="#94a3b8" font-size="15">from ambiguous inputs to shipped tools, dashboards, and agent systems</text>

    <g filter="url(#shadow)">
      <rect x="50" y="135" width="220" height="130" rx="16" fill="url(#panel)" stroke="#334155"/>
      <text x="75" y="170" fill="#5eead4" font-size="14" font-weight="700">INPUTS</text>
      <text x="75" y="198" fill="#e2e8f0" font-size="17" font-weight="650">PDFs, APIs, OpenAPI</text>
      <text x="75" y="225" fill="#e2e8f0" font-size="17" font-weight="650">security data</text>
      <text x="75" y="252" fill="#e2e8f0" font-size="17" font-weight="650">product ambiguity</text>

      <rect x="380" y="115" width="220" height="170" rx="16" fill="url(#panel)" stroke="#475569"/>
      <text x="405" y="150" fill="#f59e0b" font-size="14" font-weight="700">ENGINE ROOM</text>
      <text x="405" y="178" fill="#f8fafc" font-size="18" font-weight="700">TypeScript + React</text>
      <text x="405" y="207" fill="#e2e8f0" font-size="16">agent harnesses</text>
      <text x="405" y="232" fill="#e2e8f0" font-size="16">data visualization</text>
      <text x="405" y="257" fill="#e2e8f0" font-size="16">tests, CI/CD, docs</text>

      <rect x="710" y="135" width="220" height="130" rx="16" fill="url(#panel)" stroke="#334155"/>
      <text x="735" y="170" fill="#a78bfa" font-size="14" font-weight="700">OUTPUTS</text>
      <text x="735" y="198" fill="#e2e8f0" font-size="17" font-weight="650">AI skills + plugins</text>
      <text x="735" y="225" fill="#e2e8f0" font-size="17" font-weight="650">benchmarks</text>
      <text x="735" y="252" fill="#e2e8f0" font-size="17" font-weight="650">product platforms</text>
    </g>

    <path d="M270 200 H378" stroke="url(#line)" stroke-width="4" stroke-linecap="round"/>
    <path d="M600 200 H708" stroke="url(#line)" stroke-width="4" stroke-linecap="round"/>
    <path d="M358 190 L380 200 L358 210" fill="none" stroke="#5eead4" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M688 190 L710 200 L688 210" fill="none" stroke="#f59e0b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <g fill="#0f172a" stroke="#334155">
      <rect x="126" y="300" width="150" height="34" rx="17"/>
      <rect x="296" y="300" width="135" height="34" rx="17"/>
      <rect x="451" y="300" width="122" height="34" rx="17"/>
      <rect x="593" y="300" width="124" height="34" rx="17"/>
      <rect x="737" y="300" width="116" height="34" rx="17"/>
    </g>
    <g fill="#cbd5e1" font-size="13" font-weight="650">
      <text x="151" y="322">AI extraction</text>
      <text x="323" y="322">Next.js</text>
      <text x="478" y="322">Playwright</text>
      <text x="620" y="322">shadcn/ui</text>
      <text x="764" y="322">Convex</text>
    </g>
  </g>
</svg>
