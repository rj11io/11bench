<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 250" role="img" aria-labelledby="title desc">
  <title id="title">Product engineering flow</title>
  <desc id="desc">Four stages: raw signal, AI systems, product surfaces, and shipped product.</desc>
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0f172a" flood-opacity=".10"/>
    </filter>
  </defs>
  <rect width="960" height="250" rx="24" fill="#f8fafc"/>
  <path d="M190 125H254M430 125H494M670 125H734" stroke="url(#accent)" stroke-width="5" stroke-linecap="round"/>
  <path d="m245 116 12 9-12 9M485 116l12 9-12 9M725 116l12 9-12 9" fill="none" stroke="#0f766e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)">
    <rect x="30" y="50" width="160" height="150" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="270" y="50" width="160" height="150" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="510" y="50" width="160" height="150" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="750" y="50" width="180" height="150" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
  </g>

  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
    <g fill="#7c3aed" font-size="14" font-weight="700" letter-spacing="1.5">
      <text x="52" y="79">01 · SIGNAL</text>
      <text x="292" y="79">02 · SYSTEMS</text>
      <text x="532" y="79">03 · SURFACES</text>
      <text x="772" y="79">04 · SHIP</text>
    </g>
    <g fill="#0f172a" font-size="19" font-weight="700">
      <text x="52" y="112">PDFs · APIs</text>
      <text x="52" y="137">complex data</text>
      <text x="292" y="112">agents · skills</text>
      <text x="292" y="137">workflows</text>
      <text x="532" y="112">dashboards</text>
      <text x="532" y="137">explorers · docs</text>
      <text x="772" y="112">test · refine</text>
      <text x="772" y="137">reliable product</text>
    </g>
    <g fill="#475569" font-size="14">
      <text x="52" y="172">Find the useful signal.</text>
      <text x="292" y="172">Make the work repeatable.</text>
      <text x="532" y="172">Make complexity legible.</text>
      <text x="772" y="172">Own the whole path.</text>
    </g>
  </g>
</svg>
