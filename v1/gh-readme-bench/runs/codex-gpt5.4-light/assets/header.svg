<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Ricardo Jorge profile header</title>
  <desc id="desc">A clean banner introducing Ricardo Jorge as an AI Product Engineer focused on AI systems, data visualization, and product engineering.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="55%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="50%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="360" rx="24" fill="url(#bg)"/>
  <g opacity="0.14" stroke="#94a3b8" stroke-width="1">
    <path d="M60 70H1140"/>
    <path d="M60 130H1140"/>
    <path d="M60 190H1140"/>
    <path d="M60 250H1140"/>
    <path d="M60 310H1140"/>
    <path d="M120 40V320"/>
    <path d="M300 40V320"/>
    <path d="M480 40V320"/>
    <path d="M660 40V320"/>
    <path d="M840 40V320"/>
    <path d="M1020 40V320"/>
  </g>

  <rect x="70" y="58" width="138" height="28" rx="14" fill="#111827" stroke="#334155"/>
  <text x="139" y="77" fill="#e5e7eb" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" text-anchor="middle">LISBON, PORTUGAL</text>

  <text x="70" y="155" fill="#f8fafc" font-family="Georgia, 'Times New Roman', serif" font-size="66" font-weight="700">Ricardo Jorge</text>
  <text x="73" y="201" fill="#cbd5e1" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="26">AI Product Engineer</text>

  <rect x="70" y="222" width="510" height="8" rx="4" fill="url(#accent)"/>

  <text x="70" y="272" fill="#e2e8f0" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="23">
    <tspan x="70" dy="0">AI systems, data-heavy products, and frontend architecture</tspan>
    <tspan x="70" dy="34">from first-hire foundations to open-source workflows</tspan>
  </text>

  <g transform="translate(770 76)">
    <rect width="340" height="210" rx="20" fill="#0b1220" stroke="#334155"/>
    <text x="24" y="42" fill="#93c5fd" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">current_focus = {</text>
    <text x="42" y="78" fill="#f8fafc" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">ai_products: true,</text>
    <text x="42" y="108" fill="#f8fafc" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">agent_workflows: true,</text>
    <text x="42" y="138" fill="#f8fafc" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">data_visualisation: true,</text>
    <text x="42" y="168" fill="#f8fafc" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">typescript_roots: '2015+'</text>
    <text x="24" y="194" fill="#93c5fd" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">}</text>
  </g>
</svg>
