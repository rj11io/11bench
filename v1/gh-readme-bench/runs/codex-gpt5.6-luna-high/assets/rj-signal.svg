<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-labelledby="title desc">
  <title id="title">RJ's build signal</title>
  <desc id="desc">A three-stop path from game systems to data products to agent systems, connected by a single line.</desc>
  <rect width="1200" height="300" rx="24" fill="#0d1117"/>
  <path d="M110 164 C250 88 350 230 490 150 S720 74 820 148 S1010 220 1090 126" fill="none" stroke="#7ee787" stroke-width="4" stroke-linecap="round"/>
  <path d="M110 164 C250 88 350 230 490 150 S720 74 820 148 S1010 220 1090 126" fill="none" stroke="#7ee787" stroke-width="16" stroke-linecap="round" opacity=".08"/>
  <g fill="#0d1117" stroke="#7ee787" stroke-width="4">
    <circle cx="110" cy="164" r="14"/>
    <circle cx="490" cy="150" r="14"/>
    <circle cx="820" cy="148" r="14"/>
    <circle cx="1090" cy="126" r="14"/>
  </g>
  <g fill="#f0f6fc" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <text x="72" y="74" font-size="18" fill="#8b949e" letter-spacing="2">ORIGIN</text>
    <text x="72" y="108" font-size="28" font-weight="700">GAME SYSTEMS</text>
    <text x="72" y="210" font-size="16" fill="#8b949e">mods / reverse engineering / servers</text>
    <text x="452" y="62" font-size="18" fill="#8b949e" letter-spacing="2">SPECIALTY</text>
    <text x="452" y="96" font-size="28" font-weight="700">DATA PRODUCTS</text>
    <text x="452" y="198" font-size="16" fill="#8b949e">dashboards / explorers / visualisation</text>
    <text x="782" y="76" font-size="18" fill="#8b949e" letter-spacing="2">NOW</text>
    <text x="782" y="110" font-size="28" font-weight="700">AGENT SYSTEMS</text>
    <text x="782" y="210" font-size="16" fill="#8b949e">skills / harnesses / automations</text>
    <text x="1014" y="74" font-size="18" fill="#8b949e" letter-spacing="2">SHIP</text>
    <text x="1014" y="108" font-size="28" font-weight="700">PRODUCT</text>
    <text x="1014" y="210" font-size="16" fill="#8b949e">from target to working interface</text>
  </g>
  <text x="72" y="262" font-size="14" fill="#7ee787" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">RICARDO JORGE / RJ11IO</text>
</svg>
