<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 520" role="img" aria-labelledby="title desc">
  <title id="title">Product engineering flow</title>
  <desc id="desc">Four stages: raw signal, AI systems, product surfaces, and shipped product.</desc>
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c4b5fd"/>
      <stop offset="1" stop-color="#5eead4"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity=".28"/>
    </filter>
  </defs>
  <rect width="420" height="520" rx="22" fill="#0d1117"/>
  <path d="M210 113V137M210 238V262M210 363V387" stroke="url(#accent)" stroke-width="5" stroke-linecap="round"/>
  <path d="m202 128 8 10 8-10M202 253l8 10 8-10M202 378l8 10 8-10" fill="none" stroke="#5eead4" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)" fill="#161b22" stroke="#30363d">
    <rect x="20" y="15" width="380" height="98" rx="16"/>
    <rect x="20" y="140" width="380" height="98" rx="16"/>
    <rect x="20" y="265" width="380" height="98" rx="16"/>
    <rect x="20" y="390" width="380" height="98" rx="16"/>
  </g>

  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
    <g fill="#c4b5fd" font-size="13" font-weight="700" letter-spacing="1.2">
      <text x="40" y="43">01 · SIGNAL</text>
      <text x="40" y="168">02 · SYSTEMS</text>
      <text x="40" y="293">03 · SURFACES</text>
      <text x="40" y="418">04 · SHIP</text>
    </g>
    <g fill="#f0f6fc" font-size="19" font-weight="700">
      <text x="40" y="72">PDFs · APIs · complex data</text>
      <text x="40" y="197">agents · skills · workflows</text>
      <text x="40" y="322">dashboards · explorers · docs</text>
      <text x="40" y="447">test · refine · reliable product</text>
    </g>
    <g fill="#9da7b3" font-size="13">
      <text x="40" y="94">Find the useful signal.</text>
      <text x="40" y="219">Make the work repeatable.</text>
      <text x="40" y="344">Make complexity legible.</text>
      <text x="40" y="469">Own the whole path.</text>
    </g>
  </g>
</svg>
