<svg xmlns="http://www.w3.org/2000/svg" width="960" height="240" viewBox="0 0 960 240" role="img" aria-labelledby="title desc">
  <title id="title">From raw signal to clear decision</title>
  <desc id="desc">A four-stage product engineering path: raw signal, structured data, useful interface, clear decision.</desc>
  <rect width="960" height="240" rx="18" fill="#f6f8fa"/>
  <path d="M106 120H854" stroke="#d0d7de" stroke-width="2"/>
  <path d="M106 120C170 120 170 67 234 67S298 173 362 173 426 88 490 88 554 140 618 140 682 67 746 67 790 67 810 120 854 120" fill="none" stroke="#0969da" stroke-width="5" stroke-linecap="round"/>
  <g fill="#ffffff" stroke="#0969da" stroke-width="4">
    <circle cx="106" cy="120" r="13"/>
    <circle cx="362" cy="173" r="13"/>
    <circle cx="618" cy="140" r="13"/>
    <circle cx="854" cy="120" r="13"/>
  </g>
  <g fill="#1f2328" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
    <text x="106" y="50" text-anchor="middle" font-size="22" font-weight="700" letter-spacing="1.2">RAW SIGNAL</text>
    <text x="362" y="220" text-anchor="middle" font-size="22" font-weight="700" letter-spacing="1.2">STRUCTURED DATA</text>
    <text x="618" y="190" text-anchor="middle" font-size="22" font-weight="700" letter-spacing="1.2">USEFUL INTERFACE</text>
    <text x="854" y="50" text-anchor="middle" font-size="22" font-weight="700" letter-spacing="1.2">CLEAR DECISION</text>
  </g>
</svg>
